# Tự deploy production lên Vercel mỗi khi push lên nhánh main hoặc master.
#
# Cần thêm GitHub Secrets (Repo → Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN        — https://vercel.com/account/tokens
#   VERCEL_ORG_ID       — team_... (Vercel → Project → Settings → General)
#   VERCEL_PROJECT_ID   — prj_... (cùng trang)
#
# Có thể chạy tay: tab Actions → workflow này → Run workflow.

name: Deploy to Vercel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"
